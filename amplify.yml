version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - printf "CHECKWX_API_KEY=%s\nGEMINI_API_KEY=%s\n" "$CHECKWX_API_KEY" "$GEMINI_API_KEY" > .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
